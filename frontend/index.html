<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenue Insight Agent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Revenue Insight Agent</h1>
        <p class="subtitle">Upload your sales CSV. Get AI-powered analysis in seconds.</p>
        
        <!-- Drag and drop zone -->
        <div id="dropZone" class="drop-zone">
            <p>Drag & drop your CSV file here</p>
            <p class="or">or</p>
            <input type="file" id="fileInput" accept=".csv" hidden>
            <button onclick="document.getElementById('fileInput').click()">Choose File</button>
            <p id="fileName" class="file-name"></p>
        </div>
        
        <!-- Upload button -->
        <button id="uploadBtn" class="upload-btn" disabled>Upload & Analyze</button>
        
        <!-- Status messages -->
        <div id="status" class="status"></div>
        
        <!-- Results display -->
        <div id="results" class="results hidden">
            <h2>Analysis Report</h2>
            <div id="metrics" class="metrics"></div>
            <div id="reportText" class="report-text"></div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
